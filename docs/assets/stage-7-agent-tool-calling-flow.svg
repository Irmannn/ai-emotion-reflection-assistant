<svg width="1400" height="820" viewBox="0 0 1400 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="820" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4FBF7"/>
      <stop offset="0.55" stop-color="#FFF9EE"/>
      <stop offset="1" stop-color="#EEF7FF"/>
    </linearGradient>
    <linearGradient id="agent" x1="565" y1="255" x2="835" y2="515" gradientUnits="userSpaceOnUse">
      <stop stop-color="#183A5A"/>
      <stop offset="1" stop-color="#2F6F73"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#203040" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#2F4858" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#2F7D68" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" stroke="#C06B2C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font: 800 34px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .subtitle { font: 500 17px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #526173; }
      .label { font: 800 21px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #172033; }
      .small { font: 500 15px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #5E6B7A; }
      .tiny { font: 700 13px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #6D7A88; letter-spacing: .04em; }
      .whiteLabel { font: 800 24px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .whiteSmall { font: 500 15px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #DBF3EE; }
      .pillText { font: 800 14px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .noteTitle { font: 800 20px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #7A3D0C; }
      .noteText { font: 500 15px "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; fill: #6A4B2A; }
    </style>
  </defs>

  <rect width="1400" height="820" rx="34" fill="url(#bg)"/>

  <text x="70" y="72" class="title">Agent Tool Calling 工程流程</text>
  <text x="70" y="106" class="subtitle">核心理解：模型 API 负责“决定要不要调用工具”，FastAPI 后端负责“真正执行工具”。</text>

  <rect x="70" y="150" width="180" height="120" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="118" cy="201" r="28" fill="#E8F4FF"/>
  <path d="M118 186C125 186 130 191 130 198C130 205 125 210 118 210C111 210 106 205 106 198C106 191 111 186 118 186Z" fill="#315A7D"/>
  <path d="M96 229C101 218 109 214 118 214C127 214 135 218 140 229" stroke="#315A7D" stroke-width="7" stroke-linecap="round"/>
  <text x="162" y="194" class="label">用户</text>
  <text x="162" y="224" class="small">自然语言请求</text>

  <rect x="310" y="150" width="210" height="120" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="346" y="181" width="58" height="46" rx="8" fill="#EAF8F0" stroke="#6BAE91" stroke-width="3"/>
  <path d="M356 198H394M356 210H381" stroke="#2F7D68" stroke-width="4" stroke-linecap="round"/>
  <text x="426" y="194" class="label">前端页面</text>
  <text x="426" y="224" class="small">展示表单与结果</text>

  <rect x="580" y="150" width="240" height="120" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="620" y="178" width="54" height="54" rx="14" fill="#FFF2DF"/>
  <path d="M634 196H660M634 208H660M634 220H650" stroke="#C06B2C" stroke-width="4" stroke-linecap="round"/>
  <text x="694" y="194" class="label">FastAPI 接口</text>
  <text x="694" y="224" class="small">接收请求 / 返回响应</text>

  <rect x="900" y="150" width="260" height="120" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="946" cy="205" r="29" fill="#EAEAFE"/>
  <path d="M932 205H960M946 191V219M936 195L956 215M956 195L936 215" stroke="#5C58B6" stroke-width="4" stroke-linecap="round"/>
  <text x="990" y="194" class="label">模型 API</text>
  <text x="990" y="224" class="small">返回回答或 tool_calls</text>

  <rect x="565" y="330" width="270" height="155" rx="30" fill="url(#agent)" filter="url(#shadow)"/>
  <text x="620" y="388" class="whiteLabel">Agent Client</text>
  <text x="620" y="421" class="whiteSmall">调度模型与工具</text>
  <text x="620" y="449" class="whiteSmall">维护 messages 上下文</text>
  <rect x="602" y="357" width="12" height="96" rx="6" fill="#8FE1CB"/>

  <rect x="900" y="350" width="250" height="125" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="936" y="381" width="54" height="54" rx="14" fill="#EFF8F5"/>
  <path d="M951 398H975M951 410H975M951 422H966" stroke="#2F7D68" stroke-width="4" stroke-linecap="round"/>
  <text x="1010" y="397" class="label">Tool Runner</text>
  <text x="1010" y="427" class="small">校验白名单与参数</text>

  <rect x="900" y="555" width="250" height="130" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="936" y="590" width="54" height="54" rx="14" fill="#E8F4FF"/>
  <path d="M952 608L962 618L978 600M952 631H975" stroke="#315A7D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="1010" y="606" class="label">本地业务工具</text>
  <text x="1010" y="636" class="small">查历史 / 搜复盘 / 查详情</text>

  <rect x="575" y="555" width="250" height="130" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <ellipse cx="630" cy="597" rx="34" ry="14" fill="#DFF2EA" stroke="#2F7D68" stroke-width="3"/>
  <path d="M596 597V633C596 641 611 648 630 648C649 648 664 641 664 633V597" stroke="#2F7D68" stroke-width="3"/>
  <path d="M596 615C596 623 611 630 630 630C649 630 664 623 664 615" stroke="#2F7D68" stroke-width="3"/>
  <text x="690" y="606" class="label">SQLite</text>
  <text x="690" y="636" class="small">复盘记录 / 工具日志</text>

  <rect x="150" y="595" width="290" height="90" rx="22" fill="#FFF8E9" stroke="#E4B66A" stroke-width="2"/>
  <text x="184" y="631" class="noteTitle">关键边界</text>
  <text x="184" y="660" class="noteText">模型不直接读库，不直接执行工具</text>

  <path d="M250 210H310" stroke="#2F4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="260" y="195" class="tiny">message</text>

  <path d="M520 210H580" stroke="#2F4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="525" y="195" class="tiny">POST</text>

  <path d="M700 270V330" stroke="#2F4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="716" y="307" class="tiny">进入调度器</text>

  <path d="M835 378C872 340 886 278 910 236" stroke="#2F7D68" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="842" y="316" class="tiny">messages + tools schema</text>

  <path d="M900 245C865 292 850 344 835 387" stroke="#C06B2C" stroke-width="3" marker-end="url(#arrowOrange)"/>
  <text x="852" y="285" class="tiny">tool_calls 或 final answer</text>

  <path d="M835 413H900" stroke="#2F4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="840" y="399" class="tiny">tool_calls</text>

  <path d="M1025 475V555" stroke="#2F4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1040" y="520" class="tiny">执行工具</text>

  <path d="M900 620H825" stroke="#2F4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="842" y="604" class="tiny">读写数据</text>

  <path d="M575 620C505 610 482 540 520 472C542 433 560 420 565 415" stroke="#2F7D68" stroke-width="3" marker-end="url(#arrowGreen)"/>
  <text x="418" y="540" class="tiny">tool result</text>

  <path d="M565 395C485 380 438 323 416 270" stroke="#2F4858" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="440" y="342" class="tiny">final answer + 工具摘要</text>

  <path d="M310 232C264 310 246 450 300 595" stroke="#C06B2C" stroke-width="3" stroke-dasharray="8 8" marker-end="url(#arrowOrange)"/>
  <text x="128" y="406" class="tiny">前端只展示结果，不执行工具</text>

  <rect x="70" y="730" width="1260" height="48" rx="16" fill="#FFFFFF" opacity="0.82"/>
  <text x="100" y="760" class="small">一句话：模型 API 只产出工具调用意图，Agent Client 接住这个意图，FastAPI 后端执行本地工具，再把结果交回模型生成最终回答。</text>
</svg>
